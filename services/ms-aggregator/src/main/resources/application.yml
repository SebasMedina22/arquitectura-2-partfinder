spring:
  application:
    name: ms-aggregator

  # Store relacional para outbox + projeccion de creditos de workshops + ordenes
  datasource:
    url: jdbc:mysql://localhost:3307/aggregator?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: aggregator
    password: aggregator
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Catalogo de partes y busqueda
  elasticsearch:
    uris: http://localhost:9200
    socket-timeout: 5s
    connection-timeout: 2s

  rabbitmq:
    host: localhost
    port: 5672
    username: partfinder
    password: partfinder
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1s
          max-attempts: 3
          multiplier: 2
        default-requeue-rejected: false

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: ms-aggregator

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

inventory-direct:
  base-url: http://localhost:8082

# El Circuit Breaker tiene proposito complementario: si el MS sincrono falla
# sistematicamente, abrimos el breaker para no martillarlo. La regla R1 del caso
# (timeout > 800ms = UNCERTAIN) la materializa el read-timeout de Feign + el catch
# del adapter.
resilience4j:
  circuitbreaker:
    instances:
      inventory:
        sliding-window-size: 10
        failure-rate-threshold: 50
        slow-call-rate-threshold: 80
        slow-call-duration-threshold: 800ms
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true

# Timeouts de Feign aplicados via bean Request.Options en infrastructure/client/FeignConfig.java
# (la propiedad cambio de namespace en Spring Cloud 2025; el bean es deterministico).
aggregator-feign:
  connect-timeout-ms: 500
  read-timeout-ms: 800

aggregator:
  rules:
    timeout-ms: 800
  outbox:
    poll-interval-ms: 1000
    batch-size: 50
  seed:
    enabled: true

logging:
  level:
    root: INFO
    com.partfinder.aggregator: DEBUG
